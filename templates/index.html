<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; display: flex; background: #0b1622; color: white; font-family: sans-serif; }
        /* Left Menu */
        .sidebar { width: 200px; background: #182635; height: 100vh; padding: 20px; }
        /* Main Content */
        .content { flex: 1; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e3044; padding: 15px; border-radius: 10px; }
        .card img { width: 100%; border-radius: 8px; }
        .btn { background: #e50914; padding: 10px; width: 100%; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>My Wallet</h3>
        <p>Paid: ₹{{ user.paid }}</p>
        <p>Balance: ₹{{ user.balance }}</p>
    </div>
    
    <div class="content">
        <div class="grid">
            {% for item in data %}
            <div class="card">
                <img src="{{ loop.index }}.jpg">
                <p>{{ item }}</p>
                <button class="btn">PURCHASE</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
