<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
        }
        .card { 
            background: #121212; 
            border: 1px solid #222; 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 15px; 
            /* Ye line card ko mobile ki screen width ke hisaab se adjust karegi */
            width: 100%; 
            box-sizing: border-box; 
        }
        .card img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            display: block; 
            margin-bottom: 12px; 
        }
        .content { 
            font-size: 15px; 
            color: #e0e0e0; 
            margin-bottom: 12px; 
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .btn { 
            background: #e50914; 
            color: white; 
            padding: 14px; 
            display: block; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600; 
            text-align: center; 
            font-size: 16px;
        }
    </style>
</head>
<body>
    {% for i in range(1, 7) %}
    <div class="card">
        <img src="{{ url_for('static', filename=i|string + '.jpg') }}" alt="Image {{ i }}">
        <div class="content">{{ data[i-1] }}</div>
        <a href="/pay/{{ i }}" class="btn">CONTACT ADMIN</a>
    </div>
    {% endfor %}
</body>
</html>
