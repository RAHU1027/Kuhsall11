<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Collection</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }

        strike { color: #888; }
        .buy-btn { display: block; background: #e50914; color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Premium Store</h1>

    {% for text in data %}
    <div class="box">
        <pre style="white-space: pre-wrap; font-family: sans-serif;">{{ text }}</pre>
        <a href="https://t.me/KUSHAL206" class="buy-btn">CONTACT ADMIN TO BUY</a>
    </div>
    {% endfor %}

</body>
</html>
