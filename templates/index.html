<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b1622; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .card { background: #182635; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #2a3d51; }
        .card img { width: 100%; border-radius: 10px; display: block; }
        .content { font-size: 14px; white-space: pre-wrap; margin: 15px 0; color: #ccc; }
        .btn { background: #e50914; color: white; padding: 12px; display: block; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    {% for i in range(1, 7) %}
    <div class="card">
        <img src="{{ i }}.jpg" alt="Video">
        <div class="content">{{ data[i-1] }}</div>
        <a href="/pay/{{ i }}" class="btn">BUY NOW</a>
    </div>
    {% endfor %}
</body>
</html>
