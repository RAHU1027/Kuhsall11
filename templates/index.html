<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    {% set btn_classes = ['btn-red', 'btn-white', 'btn-blue', 'btn-green', 'btn-purple', 'btn-orange'] %}
    
    {% for item in data %}
    <div class="card">
        <!-- Image path: static/p1.jpg, static/p2.jpg hona chahiye -->
        <img src="{{ url_for('static', filename='p' + loop.index|string + '.jpg') }}" 
             alt="Image" 
             onerror="this.style.display='none'">
        
        <div class="content">{{ item|safe }}</div>
        
        <a href="https://t.me/KUSHAL206" class="btn {{ btn_classes[loop.index0 % btn_classes|length] }}">BUY NOW</a>
    </div>
    {% endfor %}

</body>
</html>
