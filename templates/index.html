<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b1622; color: #fff; font-family: sans-serif; padding: 10px; margin: 0; }
        .card { background: #182635; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #2a3d51; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; display: block; }
        .text { font-size: 14px; line-height: 1.4; color: #ddd; margin-bottom: 10px; }
        .btn { background: #e50914; color: white; padding: 12px; display: block; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    {% for i in range(1, 7) %}
    <div class="card">
        <img src="{{ url_for('static', filename=i|string + '.jpg') }}" alt="Image">
        <div class="text">{{ content[i-1]|safe }}</div>
        <a href="https://t.me/KUSHAL206" class="btn">CONTACT ADMIN</a>
    </div>
    {% endfor %}
</body>
</html>
